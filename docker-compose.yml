version: '3.8'

services:
  ore-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ore-classifier
    ports:
      - "8501:8501"
    volumes:
      # Монтируем директории для сохранения результатов и конфигов
      - ./data:/app/data
      - ./results:/app/results
      - ./config.json:/app/config.json:ro
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    restart: unless-stopped
    # Ресурсные ограничения
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
        reservations:
          cpus: '2.0'
          memory: 2G
